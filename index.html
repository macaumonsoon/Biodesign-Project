<!DOCTYPE html>
<html lang="zh-Hans">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Extinction Archive · GitHub Pages 主页</title>
  <meta name="description" content="项目简介、PPT 与视频入口、交互原型导航。" />
  <style>
    :root { --bg:#0c0f12; --panel:#141a20; --border:#243040; --text:#e8eef4; --muted:#8fa3b8; --link:#7ec8ff; --accent:#5eb8a8; }
    * { box-sizing: border-box; }
    body { margin:0; font:15px/1.6 system-ui, "PingFang SC", sans-serif; background:var(--bg); color:var(--text); min-height:100vh; padding:1.5rem; }
    .box { max-width:860px; margin:0 auto; }
    h1 { font-size:1.35rem; font-weight:650; margin:0 0 0.6rem; }
    h2 { font-size:1rem; margin:0 0 0.55rem; }
    p { color:var(--muted); margin:0 0 1rem; }
    ul { margin:0; padding-left:1.15rem; }
    li { margin:0.35rem 0; }
    a { color:var(--link); text-decoration:none; }
    a:hover { text-decoration:underline; }
    .k { color:var(--accent); font-size:0.8rem; letter-spacing:0.04em; text-transform:uppercase; }
    .grid { display:grid; gap:0.9rem; grid-template-columns:repeat(auto-fit,minmax(280px,1fr)); margin-top:1rem; }
    .card { background:var(--panel); border:1px solid var(--border); border-radius:10px; padding:1rem; }
    code { font-size:0.84em; background:#1a222c; padding:0.12em 0.35em; border-radius:4px; }
  </style>
</head>
<body>
  <div class="box">
    <p class="k">BDC 2026 · Extinction Archive</p>
    <h1>Extinction Archive · GitHub Pages 主页</h1>
    <p>统一入口：项目介绍、演示素材与原型导航都从这里进入。建议优先访问 <a href="docs/index.html">项目进展页</a>。</p>

    <div class="grid">
      <section class="card">
        <h2>推荐访问路径</h2>
        <ul>
          <li><a href="docs/index.html">项目进展一览（主页面）</a></li>
          <li><a href="prototype/index.html">灭绝档案 · 互动地球仪原型</a></li>
          <li><a href="prototype/webxr/index.html">沉浸星球（WebGL）</a></li>
        </ul>
      </section>

      <section class="card">
        <h2>介绍素材（PPT / Video / Rideo）</h2>
        <ul>
          <li><a href="assets/media/intro-presentation.pdf">介绍 PPT（PDF）</a></li>
          <li><a href="assets/media/intro-video.mp4">介绍视频 MP4</a></li>
          <li><a href="docs/index.html#intro-media">在进展页内查看内嵌播放（rideo）</a></li>
        </ul>
        <p style="margin-top:0.7rem;">素材路径：<code>assets/media/</code></p>
      </section>
    </div>
  </div>
</body>
</html>
